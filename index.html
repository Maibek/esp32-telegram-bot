<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ESP32 Control</title>
  <!-- Подключаем скрипт Telegram WebApp -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    /* Тут стили: кнопки, карточки датчиков */
    body { font-family: sans-serif; padding: 20px; }
    .btn { padding: 15px; margin: 10px 0; width: 100%; }
  </style>
</head>
<body>
  <h2>🌡️ Датчики</h2>
  <div id="sensor-data">Загрузка...</div>
  
  <h2>💡 Управление</h2>
  <button class="btn" onclick="sendCommand('relay0_on')">Включить реле 0</button>
  <button class="btn" onclick="sendCommand('relay0_off')">Выключить реле 0</button>
  <!-- Добавь остальные кнопки -->

  <script>
    // Инициализация WebApp
    const tg = window.Telegram.WebApp;
    tg.expand(); // Раскрыть на весь экран
    
    // Функция отправки команды боту
    function sendCommand(cmd) {
      // sendData отправляет данные боту как "сообщение от WebApp"
      tg.sendData(JSON.stringify({ command: cmd }));
    }
    
    // (Опционально) Показать данные пользователя для отладки
    console.log("User ID:", tg.initDataUnsafe?.user?.id);
  </script>
</body>
</html>
